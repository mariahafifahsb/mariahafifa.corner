<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Anggota</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#e6fff5,#ffffff);
    margin:0;
}

header{
    padding:20px 40px;
    font-weight:bold;
    font-size:20px;
    color:#1b4332;
}

.container{
    padding:40px;
}

h2{
    color:#1b4332;
}

.btn{
    background:linear-gradient(135deg,#52b788,#40916c);
    color:white;
    padding:10px 20px;
    border-radius:25px;
    text-decoration:none;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#40916c;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.hapus{
    background:#d00000;
    color:white;
    padding:6px 12px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<header>Mariah Afifa Library</header>

<div class="container">
<h2>Data Anggota</h2>

<a href="tambah.html" class="btn">+ Tambah Anggota</a>

<div class="card">
<table>
<tr>
<th>No</th>
<th>Nama</th>
<th>Email</th>
<th>No HP</th>
<th>Aksi</th>
</tr>
<tbody id="dataAnggota"></tbody>
</table>
</div>
</div>

<script>
let anggota = JSON.parse(localStorage.getItem("anggota")) || [
    {nama:"Mariah Afifa", email:"mariah@gmail.com", hp:"081234567890"},
    {nama:"Siti Aisyah", email:"aisyah@gmail.com", hp:"082134567890"},
    {nama:"Rahmat Hidayat", email:"rahmat@gmail.com", hp:"083234567890"},
    {nama:"Dewi Lestari", email:"dewi@gmail.com", hp:"084334567890"}
];

function tampilkanData(){
    let isi = "";
    anggota.forEach((a,i)=>{
        isi += `
        <tr>
            <td>${i+1}</td>
            <td>${a.nama}</td>
            <td>${a.email}</td>
            <td>${a.hp}</td>
            <td><button class="hapus" onclick="hapusData(${i})">Hapus</button></td>
        </tr>`;
    });
    document.getElementById("dataAnggota").innerHTML = isi;
    localStorage.setItem("anggota",JSON.stringify(anggota));
}

function hapusData(index){
    if(confirm("Hapus data?")){
        anggota.splice(index,1);
        tampilkanData();
    }
}

tampilkanData();
</script>

</body>
</html>
