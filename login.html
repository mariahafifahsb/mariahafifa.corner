<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#e6fff5,#ffffff);
}

.login-box{
    background:linear-gradient(#52b788,#40916c);
    padding:35px;
    width:360px;
    border-radius:15px;
    color:white;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#1b4332;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#081c15;
}

.pesan{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.sukses{ color:#d8f3dc; }
.gagal{ color:#ffccd5; }
.warning{ color:#ffe066; }

a{
    color:#d8f3dc;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button type="submit">Masuk</button>
    </form>

    <div id="pesan" class="pesan"></div>

    <div class="pesan">
        Belum punya akun? <a href="register.html">Register</a>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
    let pesan = document.getElementById("pesan");

    if(user === "" || pass === ""){
        pesan.className = "pesan warning";
        pesan.innerHTML = "Input tidak lengkap!";
    }
    else if(user === "admin" && pass === "12345"){
        pesan.className = "pesan sukses";
        pesan.innerHTML = "Login berhasil!";
    }
    else if(user !== "admin"){
        pesan.className = "pesan gagal";
        pesan.innerHTML = "Username tidak ditemukan!";
    }
    else{
        pesan.className = "pesan gagal";
        pesan.innerHTML = "Password salah!";
    }
});
</script>

</body>
</html>
