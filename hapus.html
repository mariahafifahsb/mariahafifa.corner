<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hapus Data</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(#e6fff5,#ffffff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:35px;
    width:400px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

h2{
    color:#d00000;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin:10px;
}

.hapus{
    background:#d00000;
    color:white;
}

.batal{
    background:#40916c;
    color:white;
}
</style>
</head>
<body>

<div class="box">
<h2>Hapus Semua Data?</h2>
<p>Data anggota akan dihapus permanen.</p>

<button class="hapus" onclick="hapusSemua()">Hapus</button>
<button class="batal" onclick="window.location='data.html'">Batal</button>
</div>

<script>
function hapusSemua(){
    localStorage.removeItem("anggota");
    alert("Semua data berhasil dihapus!");
    window.location="data.html";
}
</script>

</body>
</html>
